<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapter & Shelf — Sweet</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream: #fdf6f0; --gold: #c8845a; --gold-light: #e8d5b0; --dark: #5c3a1e; --muted: #a07850; --border: #e8d8cc; --card-bg: #fff9f5; }
    body { background-color: var(--cream); font-family: 'Jost', sans-serif; color: var(--dark); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .back-link { position: fixed; top: 20px; left: 20px; font-size: 11px; color: var(--muted); text-decoration: none; letter-spacing: 1px; }
    .back-link:hover { color: var(--gold); }
    .gate-wrap { text-align: center; max-width: 340px; width: 100%; }
    .brand { font-family: 'Cormorant Garamond', serif; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
    .gate-title { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 300; color: var(--dark); margin-bottom: 4px; }
    .gate-title em { font-style: italic; color: var(--gold); }
    .gate-sub { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 28px; }
    .theme-dot { width: 32px; height: 32px; border-radius: 50%; margin: 0 auto 16px; border: 0.5px solid var(--border); background: #f5dfc0; }
    .gate-box { background: var(--card-bg); border: 0.5px solid var(--border); border-radius: 12px; padding: 24px; }
    .lock { font-size: 20px; margin-bottom: 10px; opacity: 0.4; }
    .gate-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
    .input-row { display: flex; gap: 8px; }
    .gate-input { flex: 1; padding: 9px 12px; border: 0.5px solid var(--border); border-radius: 6px; font-family: 'Jost', sans-serif; font-size: 13px; background: white; color: var(--dark); outline: none; }
    .gate-input:focus { border-color: var(--gold); }
    .gate-btn { padding: 9px 14px; background: var(--dark); color: var(--cream); border: none; border-radius: 6px; font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; }
    .gate-btn:hover { background: var(--gold); }
    .gate-error { font-size: 11px; color: #c0392b; margin-top: 8px; display: none; }
  </style>
</head>
<body>

  <a class="back-link" href="../">← Back</a>

  <div class="gate-wrap">
    <div class="brand">Chapter & Shelf</div>
    <h1 class="gate-title">Sweet <em></em></h1>
    <p class="gate-sub">Bookcard Maker</p>
    <div class="theme-dot"></div>
    <div class="gate-box">
      <div class="lock">🔒</div>
      <div class="gate-label">Enter your access key</div>
      <div class="input-row">
        <input type="password" class="gate-input" id="gate-input" placeholder="Password..." onkeydown="if(event.key==='Enter') checkPassword()">
        <button class="gate-btn" onclick="checkPassword()">→</button>
      </div>
      <div class="gate-error" id="gate-error">Incorrect password.</div>
    </div>
  </div>

<script>
  const PASSWORD = 'opentheshelf';
  const TOOL = 'bookcard-sweet-final.html';
  function checkPassword() {
    const input = document.getElementById('gate-input').value.trim().toLowerCase();
    if (input === PASSWORD) {
      window.location.href = TOOL;
    } else {
      document.getElementById('gate-error').style.display = 'block';
      document.getElementById('gate-input').value = '';
      document.getElementById('gate-input').focus();
    }
  }
</script>
</body>
</html>
